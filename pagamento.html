<body class="page-checkout">

        <h2 class="titulo-checkout">Finalizar Compra</h2>
        <p>Realize o pagamento via <strong>PIX</strong> para liberar seus créditos:</p>
        
        <div class="pix-card">
            <span class="label-pix">Chave PIX (Celular)</span>
            <div class="chave-area">
                <code id="pix-chave">3298510616</code>
                <button onclick="copiarPix()" class="btn-copy">Copiar</button>
            </div>

        <div class="passos">
            <p>1. Copie a chave acima.</p>

            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="18"> Já paguei! Enviar Comprovante

    </div>

    <script>
        function copiarPix() {
            const chave = "3298510616";
            navigator.clipboard.writeText(chave);
            alert("Chave PIX copiada! Agora cole no seu aplicativo do banco.");
        }
    </script>
</body>
</html>
